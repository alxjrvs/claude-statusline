name: ci

# Lints and tests the statusline scripts on every push to main and every PR.
# Mirrors the dotFiles lint.yml style: mise installs the lint tools, then
# shellcheck + shfmt run over the tracked shell scripts, and the snapshot
# suite renders the statusline against fixtures. Test only — nothing here
# mutates state or touches ~/.local/bin.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PATH + shims for the lint tools only — no full toolchain install.
      - uses: jdx/mise-action@v2
        with:
          install: false
      - name: Install lint tools
        run: mise install shellcheck shfmt jq

      # Every tracked shell script. -x follows `source`d files (none today,
      # but keeps parity with dotFiles and is future-proof).
      - name: shellcheck
        run: shellcheck -x $(git ls-files '*.sh')

      # Same flags as dotFiles lint.yml (2-space indent, switch-case indent,
      # redirect-operator spacing).
      - name: shfmt
        run: shfmt -d -i 2 -ci -sr $(git ls-files '*.sh')

      # Snapshot suite: renders statusline.sh against fixture payloads and diffs
      # the ANSI-stripped output against test/golden/, plus color-mode and
      # exit-code assertions. Needs bash 4+/jq (present on ubuntu-latest).
      - name: tests
        run: bash test/run.sh
